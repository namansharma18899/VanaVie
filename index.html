<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VanaVie</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a12;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        canvas {
            border: 1px solid rgba(204, 170, 85, 0.2);
            image-rendering: pixelated;
        }
        #loading {
            position: fixed;
            inset: 0;
            background: #0a0a12;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #ccaa55;
            font-family: monospace;
            font-size: 1.2rem;
            letter-spacing: 0.2em;
            z-index: 100;
            transition: opacity 0.5s;
        }
        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loading-bar {
            width: 200px;
            height: 4px;
            background: #222;
            border-radius: 2px;
            margin-top: 1rem;
            overflow: hidden;
        }
        .loading-fill {
            height: 100%;
            background: #ccaa55;
            width: 0%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div>LOADING</div>
        <div class="loading-bar">
            <div class="loading-fill" id="loadingFill"></div>
        </div>
    </div>
    <canvas id="canvas1"></canvas>
    <script type="module" src="script.js"></script>
</body>
</html>
